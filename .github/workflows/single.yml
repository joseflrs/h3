name: v2-ubuntu-single-hardware-accelerator
on:
  workflow_dispatch:
   inputs:
      mesa_source:
        description: 'Mesaのソースコードを選択'
        required: true
        default: 'upstream'
        type: choice
        options:
          - upstream
          - ubuntu

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write  # これがリリース作成に必要

jobs:
  command:
    name: Disk images with Mesa for Rockchip
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@main

# 2. ローカルと共通のBASHスクリプトを実行   Mesa deb
      - name: Build mesa package
        env: 
           mesa_source: ${{ github.event.inputs.mesa_source }}
        run: |
          chmod +x ./meas-build-env.sh
          sudo ./meas-build-env.sh arm64 $mesa_source

      - name: Build kernel package
        run: /bin/bash ./build-kernel.sh arm64

      - name: Build rootfs tarball
        run: |
           # Mesa deb
            chmod +x mesa-bootstrap.sh
            sudo ./mesa-bootstrap.sh arm64
            # ここで rootfs.tar.xz などができる想定

      - name: Build u-boot for nanopi-r6c
        run: /bin/bash  ./das-u-boot.sh nanopi-r6c-rk3588s_defconfig

      - name: Build disk image for nanopi-r6c
        run:  |
            sudo  ./disk_image.sh arm64 nanopi-r6c rk3588s-nanopi-r6c
            mv u-boot-rockchip.bin nanopi-r6c-u-boot-rockchip.bin

            echo "============================"
            ls -l
            echo "============================="

      - name: Get current date
        id: date
        run: echo "now=$(date +'%Y-%m-%d %H:%M')" >> $GITHUB_OUTPUT

      - name: Get kernel version
        id: kernel
        run: cat kernel_version >> $GITHUB_OUTPUT

      - name: Mesa version
        id: mesa
        run: echo "release_mesa_info=$(cat rel.txt)" >> $GITHUB_OUTPUT
        

        # --- リリース直前にこれを追加 ---
      - name: Fix file permissions
        run: sudo chown -R runner:runner ./
        # ----------------------------
      
      - name: Create Release and Upload
        uses: softprops/action-gh-release@master
        with:
          # 実行するたびにユニークなタグ名（例: build-1, build-2...）を付けます
          tag_name: build-${{ github.run_number }}
          name: "NanoPi R6C Disk Image Build ${{ github.run_number }}"
          body: |
            NanoPi R6C  ディスクイメージ with Mesa for Rockchip
            ビルド日時: ${{ steps.date.outputs.now }}
            ベースカーネル: ${{ steps.kernel.outputs.kernel_version }}
            Mesa バージョン: ${{ steps.mesa.outputs.release_mesa_info }}
          draft: false
          prerelease: false
          # ここに圧縮済みファイルのパスを指定します
          files: |
            ./Ubuntu-*img.xz 
            ./*.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}



